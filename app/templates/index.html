<!DOCTYPE html>
<html>
<head>
    <title>Resume Analyzer</title>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Data Labels Plugin -->
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>

    <style>
        body {
            font-family: Arial;
            background: #f5f7fa;
            margin: 0;
        }

        .container {
            max-width: 650px;
            margin: 40px auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h1 {
            text-align: center;
        }

        textarea {
            width: 100%;
            height: 80px;
        }

        button {
            padding: 10px;
            width: 100%;
            background: #007BFF;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        #result {
            margin-top: 20px;
        }

        /* Gauge */
        .gauge-container {
            position: relative;
            width: 100%;
            height: 40px;
            border-radius: 20px;
            overflow: hidden;
            margin-top: 15px;
        }

        .gauge-bar {
            width: 100%;
            height: 100%;
            background: linear-gradient(to right, red, orange, yellow, green);
        }

        .gauge-pointer {
            position: absolute;
            top: -10px;
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-bottom: 20px solid black;
            transition: left 0.4s ease;
        }

        .bar-box {
            width: 100%;
            height: 250px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>📄 Resume Analyzer</h1>

    <!-- FIXED: added name attributes -->
    <form id="form">
        <input type="file" id="file" name="file" required><br><br>

        <textarea id="job_desc" name="job_desc"
            placeholder="Enter job description..." required></textarea><br><br>

        <button type="submit">Analyze</button>
    </form>

    <div id="result"></div>
</div>

<script>
let chart;

document.getElementById("form").addEventListener("submit", async function(e) {
    e.preventDefault();

    const resultDiv = document.getElementById("result");

    // Loading state
    resultDiv.innerHTML = "⏳ Analyzing...";

    const formData = new FormData();
    formData.append("file", document.getElementById("file").files[0]);
    formData.append("job_desc", document.getElementById("job_desc").value);

    const res = await fetch("/analyze", {
        method: "POST",
        body: formData
    });

    // Error handling
    if (!res.ok) {
        resultDiv.innerHTML = "❌ Error analyzing resume";
        return;
    }

    const data = await res.json();

    if (data.error) {
        document.getElementById("result").innerHTML =
            `<p style="color:red;">Error: ${data.error}</p>`;
        return;
    }

    resultDiv.innerHTML = `
        <h3>📊 Analysis Result</h3>

        <p><b>🎯 Domain:</b> ${data.predicted_domain}</p>
        <p><b>Confidence:</b> ${data.confidence}</p>

        <h3 style="text-align:center;">
            ATS Score: <span id="scoreText">${data.match_score}</span>%
        </h3>

        <div class="gauge-container">
            <div class="gauge-bar"></div>
            <div class="gauge-pointer" id="pointer"></div>
        </div>

        <p><b>Similarity:</b> ${data.similarity_score}%</p>
        <p><b>Skill Score:</b> ${data.skill_score}%</p>

        <p><b>Missing Skills:</b>
            ${data.missing_skills.length
                ? data.missing_skills.join(", ")
                : "None 🎉"}
        </p>

        <p><b>Reason:</b> ${data.reason}</p>

        <div class="bar-box">
            <canvas id="barChart"></canvas>
        </div>
    `;

    // Pointer position
    const score = data.match_score;
    const pointer = document.getElementById("pointer");
    pointer.style.left = `calc(${score}% - 8px)`;

    // Chart
    const labels = data.top_predictions.map(p => p.domain);
    const scores = data.top_predictions.map(p => p.score);

    const ctx = document.getElementById("barChart").getContext("2d");

    if (chart) chart.destroy();

    chart = new Chart(ctx, {
        type: "bar",
        data: {
            labels: labels,
            datasets: [{
                label: "Prediction Score (%)",
                data: scores
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { display: false },
                datalabels: {
                    anchor: 'end',
                    align: 'top',
                    formatter: value => value + "%",
                    font: { weight: 'bold' }
                }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    max: 100
                }
            }
        },
        plugins: [ChartDataLabels]
    });

});
</script>

</body>
</html>
