<!DOCTYPE html>
<html>
<head>
    <title>Recruiter Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<h2>Recruiter Dashboard</h2>

<table border="1" id="table">
    <thead>
        <tr>
            <th>Name</th>
            <th>Job</th>
            <th>Score</th>
            <th>Missing Skills</th>
            <th>Status</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<script>
async function loadDashboard() {
    const res = await fetch("/recruiter/dashboard");
    const data = await res.json();

    const tbody = document.querySelector("#table tbody");
    tbody.innerHTML = "";

    data.forEach(d => {
        tbody.innerHTML += `
        <tr>
            <td>${d.name}</td>
            <td>${d.job}</td>
            <td>${d.score}%</td>
            <td>${d.missing_skills}</td>
            <td>${d.status ? "Selected" : "Pending"}</td>
        </tr>`;
    });
}

loadDashboard();
</script>

</body>
</html>
