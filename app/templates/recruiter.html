</head>

<body>

<h2>👨‍💼 Recruiter Dashboard</h2>

<button id="loadBtn" onclick="loadCandidates()">Load Candidates</button>

<div id="tableContainer"></div>

<script>

async function loadCandidates() {

    const btn = document.getElementById("loadBtn");
    btn.innerText = "Loading...";

    const res = await fetch("/recruiter/candidates");
    const data = await res.json();

    btn.innerText = "Load Candidates";

    let html = `
    <table>
        <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Score</th>
            <th>Domain</th>
            <th>Missing Skills</th>
            <th>Status</th>
            <th>Select</th>
        </tr>
    `;

    data.forEach(c => {

        html += `
        <tr>
            <td>${c.name}</td>
            <td>${c.email}</td>
            <td>${c.phone}</td>
            <td>${c.score}%</td>
            <td>${c.domain}</td>
            <td>${c.missing_skills}</td>

            <td>
             ${
                c.selected == 1 
                ? '<span style="color:green;font-weight:bold;">Shortlisted</span>'
                : c.selected == -1
                ? '<span style="color:red;font-weight:bold;">Rejected</span>'
                : '<span style="color:orange;font-weight:bold;">Pending</span>'
            }
            </td>

           <td>
            <input type="text" id="reason-${c.id}" placeholder="Reason">

            <button onclick="decideCandidate(${c.id}, 'shortlist')" 
                style="background: green; color: white; margin-right:5px;">
                Shortlist
            </button>

            <button onclick="decideCandidate(${c.id}, 'reject')" 
                style="background: red; color: white;">
                Reject
            </button>
            </td>
        </tr>
        `;
    });

    html += "</table>";

    document.getElementById("tableContainer").innerHTML = html;
}


async function decideCandidate(id, action) {
    let reason = document.getElementById(`reason-${id}`).value;

    await fetch("/recruiter/decision", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            id: id,
            action: action,
            reason: reason
        })
    });

    alert("Updated ✅");

    loadCandidates();
}

</script>

</body>
